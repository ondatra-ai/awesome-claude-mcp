story:
  id: str()
  title: str()
  as_a: str()
  i_want: str()
  so_that: str()
  status: enum('PLANNED', 'IN_PROGRESS', 'COMPLETE', 'BLOCKED', 'CANCELLED')
  stage: str(required=False)
  acceptance_criteria: list(include('acceptance_criterion'), min=1)

---
acceptance_criterion:
  id: regex('^AC-[0-9]+$')
  description: str()
  steps: list(include('scenario_step'), required=False)

---
scenario_step:
  given: list(any(str(), include('step_modifier')), required=False)
  when: list(any(str(), include('step_modifier')), required=False)
  then: list(any(str(), include('step_modifier')), required=False)

---
step_modifier:
  and: str(required=False)
  but: str(required=False)
