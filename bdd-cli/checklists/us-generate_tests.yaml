# Checklist for `bmad-cli us generate_tests`.
# Validates generated Playwright test files against BDD scenarios
# from docs/requirements.yaml. Runs over all scenarios at once.

version: "1.0"
last_updated: "2026-04-18"

sections:
  - id: file_existence
    name: "File Existence"
    description: "Test file exists and is non-empty"
    validation_prompts:
      - Q: "Does the test file exist at the expected path and contain at least one test.describe or test block? Answer: yes/no"
        A: "yes"
        rationale: "A generated test must exist and contain at least one test block."
        F: |
          Create the test file at the expected path with a proper Playwright test structure.
          Include test.describe block matching the scenario description.

  - id: step_mapping
    name: "Step Mapping"
    description: "BDD steps are properly mapped to test assertions"
    validation_prompts:
      - Q: "Count Given steps from the scenario that are set up in the test (as fixtures, beforeEach, or test preconditions). Answer as integer."
        A: "= total AC count"
        rationale: "Every Given step must have a corresponding setup in the test."
        F: |
          Add missing Given step setup. Each Given step should map to:
          - A fixture setup, OR
          - A beforeEach/beforeAll hook, OR
          - Initial test actions that establish preconditions

      - Q: "Count When steps from the scenario that have corresponding test actions. Answer as integer."
        A: "= total AC count"
        rationale: "Every When step must have a corresponding action in the test."
        F: |
          Add missing When step actions. Each When step should map to:
          - A page action (click, fill, navigate), OR
          - An API call, OR
          - A user interaction sequence

      - Q: "Count Then steps from the scenario that have corresponding expect() assertions. Answer as integer."
        A: "= total AC count"
        rationale: "Every Then step must have a corresponding assertion."
        F: |
          Add missing Then step assertions. Each Then step should map to:
          - An expect() assertion, OR
          - A toBeVisible/toContainText check, OR
          - A response status/body validation

  - id: playwright_patterns
    name: "Playwright Patterns"
    description: "Test follows Playwright best practices"
    validation_prompts:
      - Q: "Does the test use Playwright's built-in locator strategies (getByRole, getByText, getByTestId) instead of raw CSS/XPath selectors? Answer: yes/no"
        A: "yes"
        rationale: "Built-in locators are more resilient to UI changes."
        F: |
          Replace raw CSS/XPath selectors with Playwright locator strategies:
          - page.getByRole() for interactive elements
          - page.getByText() for text content
          - page.getByTestId() for data-testid attributes

      - Q: "Does the test use async/await properly with no floating promises? Answer: yes/no"
        A: "yes"
        rationale: "Floating promises cause flaky tests and missed assertions."
        F: |
          Add await to all async Playwright calls:
          - await page.goto()
          - await page.click()
          - await expect().toBeVisible()

  - id: error_handling
    name: "Error Handling"
    description: "Test handles errors and edge cases"
    validation_prompts:
      - Q: "Does the test include timeout configuration or waitFor calls for async operations? Answer: yes/no"
        A: "yes"
        rationale: "Tests without proper waits are flaky in CI."
        F: |
          Add appropriate wait strategies:
          - await page.waitForSelector() before assertions
          - Custom timeouts for slow operations
          - waitForResponse/waitForNavigation where needed
