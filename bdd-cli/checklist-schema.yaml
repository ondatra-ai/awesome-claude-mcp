# Yamale schema for per-command checklists under bdd-cli/checklists/.
# Each checklist is single-stage: sections[] -> validation_prompts[].

version: str()
last_updated: str()
default_docs: list(str(), required=False)
sections: list(include('section'))

---
section:
  id: str()
  name: str()
  description: str(required=False)
  source: str(required=False)
  validation_prompts: list(include('validation_prompt'))

---
validation_prompt:
  Q: str()
  A: str()
  rationale: str(required=False)
  skip: str(required=False)
  docs: list(str(), required=False)
  action_if_yes: str(required=False)
  action_if_fail: str(required=False)
  F: str(required=False)
