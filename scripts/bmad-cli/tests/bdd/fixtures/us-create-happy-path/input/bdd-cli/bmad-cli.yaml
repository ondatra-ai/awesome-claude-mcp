    apply_fix_generator: "./scripts/bmad-cli/templates/us.apply-checklist.fix-generator.prompt.tpl"
    apply_fix_generator_system: "./scripts/bmad-cli/templates/us.apply-checklist.fix-generator.system.prompt.tpl"
