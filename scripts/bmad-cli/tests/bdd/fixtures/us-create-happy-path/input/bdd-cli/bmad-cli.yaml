engine:
  type: "claude"

epics:
  path: "./docs/epics/jsons"

templates:
  prompts:
    checklist: "./scripts/bmad-cli/templates/us-checklist.prompt.tpl"
    checklist_system: "./scripts/bmad-cli/templates/us-checklist.system.prompt.tpl"
    fix_generator: "./scripts/bmad-cli/templates/us-checklist.fix-generator.prompt.tpl"
    fix_generator_system: "./scripts/bmad-cli/templates/us-checklist.fix-generator.system.prompt.tpl"
    fix_applier: "./scripts/bmad-cli/templates/us-checklist.fix-applier.prompt.tpl"
    fix_applier_system: "./scripts/bmad-cli/templates/us-checklist.fix-applier.system.prompt.tpl"
    apply_checklist: "./scripts/bmad-cli/templates/us.apply-checklist.prompt.tpl"
