# Seed registry for the `build-tests-fix-happy-path` BDD fixture.
#
# One scenario (INT-900). The `build tests --fix` happy path: the walk
# finds no test referencing the scenario id, drives the fix-generator +
# fix-applier loop, writes a test file under `tests/integration/` or a
# sibling root, re-walks, converges, exits 0.

metadata:
  title: "Test Requirements Registry (BDD fixture seed)"
  version: "2.0"
  last_updated: "2026-05-18"
  description: "Seed for build-tests-fix-happy-path fixture"

scenarios:
  INT-900:
    description: "MCP /mcp endpoint responds 200 to a valid initialize POST"
    service: "mcp-service"
    requirement: "fixture seed — expects `build tests` to create a test"
    last_updated: "2026-05-14"
    user_stories:
      - story: "docs/stories/99.3-fixture.yaml"
        scenario_id: "99.3-001"
        merge_date: "2026-05-14"
    merged_steps:
      given:
        - "the MCP server is running on its configured port"
      when:
        - "the Claude User posts a valid JSON-RPC initialize request to /mcp"
      then:
        - "the server returns HTTP 200"
