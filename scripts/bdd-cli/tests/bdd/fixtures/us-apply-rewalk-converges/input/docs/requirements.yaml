# Seed registry for the `us-apply-rewalk-converges` BDD fixture.
#
# Engineered so that `us apply 99.3 --fix` must apply TWO fixes during
# walk #1:
#   - AC-1's "duplicate?" prompt fails because INT-900 and INT-901 both
#     reference lineage id 99.3-001. F: collapses the pair into one
#     entry.
#   - AC-2's "present?" prompt fails because no entry references
#     lineage id 99.3-002. F: adds a new entry for AC-2.
#
# With the new `--fix` re-walk semantics, the engine then runs walk #2
# from AC 1 prompt 1. Walk #2 finds everything clean (the collapse fixed
# AC-1's duplicate, the add satisfied AC-2's presence) and converges.
#
# This fixture exists *only* to exercise the re-walk plumbing — that a
# walk applying any fix triggers a verification re-walk. It is the
# simplest possible deterministic case; richer cross-AC-invalidation
# fixtures can come later.

metadata:
  title: "Test Requirements Registry (BDD fixture seed)"
  version: "2.0"
  last_updated: "2026-05-14"
  description: "Seeded registry for us-apply re-walk converges fixture"

scenarios:
  INT-900:
    description: "MCP /mcp endpoint responds 200 to a valid initialize POST"
    service: "mcp-service"
    requirement: "fixture seed — duplicates INT-901 to force a collapse on walk #1"
    last_updated: "2026-05-14"
    user_stories:
      - story: "docs/stories/99.3-rewalk-fixture.yaml"
        scenario_id: "99.3-001"
        merge_date: "2026-05-14"
    merged_steps:
      given:
        - "the MCP server is running on its configured port"
        - "the server accepts JSON-RPC over HTTP POST at /mcp"
      when:
        - "the Claude User posts a valid JSON-RPC initialize request to /mcp"
      then:
        - "the server returns HTTP 200"
        - and: "the response body is a well-formed JSON-RPC envelope referencing the request id"

  INT-901:
    description: "MCP /mcp endpoint responds 200 to a valid initialize POST (duplicate-of-INT-900 seed)"
    service: "mcp-service"
    requirement: "fixture seed — duplicates INT-900 to force a collapse on walk #1"
    last_updated: "2026-05-14"
    user_stories:
      - story: "docs/stories/99.3-rewalk-fixture.yaml"
        scenario_id: "99.3-001"
        merge_date: "2026-05-14"
    merged_steps:
      given:
        - "the MCP server is running on its configured port"
        - "the server accepts JSON-RPC over HTTP POST at /mcp"
      when:
        - "the Claude User posts a valid JSON-RPC initialize request to /mcp"
      then:
        - "the server returns HTTP 200"
        - and: "the response body is a well-formed JSON-RPC envelope referencing the request id"
